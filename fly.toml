# fly.toml app configuration file generated for study-coord on 2026-07-19T17:17:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'study-coord'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
  processes = ['app']
  size = 'shared-cpu-2x'
